spring.application.name=demo

# ===== JPA/Hibernate Configuration =====
# Hibernate dialect for H2 database
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# DDL Strategy: Create tables automatically from entities
spring.jpa.hibernate.ddl-auto=create-drop

# Show generated SQL queries (for performance optimization analysis)
spring.jpa.show-sql=true

# Format SQL output for better readability
spring.jpa.properties.hibernate.format_sql=true

# Show SQL parameter binding
spring.jpa.properties.hibernate.use_sql_comments=true

# ===== Database Connection Pool =====
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 Console Configuration =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Logging Configuration =====
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== Performance and Optimization Settings =====
# Connection pool size
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Batch size for inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Second-level cache (can be enabled for production)
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true

# Enable statistics for performance monitoring
spring.jpa.properties.hibernate.generate_statistics=false
