spring.application.name=livepoll-backend
server.port=8080

# H2 database
spring.datasource.url=jdbc:h2:mem:livepolldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (must be at least 32 bytes for HS256)
app.jwt.secret=replace-this-with-a-very-long-secret-key-for-demo-only-2026
app.jwt.expiration-ms=86400000

# Frontend URL for CORS and OAuth redirects
app.frontend.url=http://localhost:5173

# Google OAuth (set your values)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
